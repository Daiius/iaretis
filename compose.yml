services:
  iaretis:
    build:
      dockerfile: Dockerfile
    container_name: iaretis
    ports:
      - "${DNS_BIND_ADDR:-127.0.0.1}:53:53/udp"
      - "${DNS_BIND_ADDR:-127.0.0.1}:53:53/tcp"
    environment:
      - LISTEN_ADDR=0.0.0.0:53
      - FILTER_FILE=/etc/iaretis/blocklist.txt
      - RUST_LOG=iaretis=info
    volumes:
      - ./blocklist.txt:/etc/iaretis/blocklist.txt:ro
    restart: unless-stopped
