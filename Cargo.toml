[package]
name = "adlibitum"
version = "0.1.0"
edition = "2024"

[dependencies]
hickory-server = "0.25"
hickory-resolver = "0.25"
hickory-proto = "0.25"
anyhow = "1"
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
strip = true
